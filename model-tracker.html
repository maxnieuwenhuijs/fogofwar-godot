<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fog of War - Model Tracker</title>
<style>
  :root {
    --bg: #14161c;
    --panel: #1c1f28;
    --panel2: #232734;
    --line: #303646;
    --text: #d8dce8;
    --dim: #8a91a5;
    --accent: #e8b84b;
    --ok: #4caf7d;
    --opt: #5a86c9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 0 80px;
    background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, "Segoe UI", sans-serif;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg); border-bottom: 1px solid var(--line);
    padding: 12px 20px;
  }
  header h1 { margin: 0 0 6px; font-size: 18px; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .topbar { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .totalwrap { flex: 1 1 260px; min-width: 220px; }
  .bar {
    height: 14px; background: var(--panel2); border-radius: 7px; overflow: hidden;
    border: 1px solid var(--line);
  }
  .bar > i {
    display: block; height: 100%; background: linear-gradient(90deg, #b98a2e, var(--accent));
    width: 0%; transition: width .25s;
  }
  .bar.small { height: 9px; }
  .barlabel { font-size: 12px; color: var(--dim); margin-top: 3px; }
  .btns { display: flex; gap: 8px; }
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    padding: 5px 12px; border-radius: 4px; cursor: pointer; font: inherit; font-size: 12px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .facnav { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .facnav a {
    text-decoration: none; color: var(--text); font-size: 12px;
    background: var(--panel2); border: 1px solid var(--line);
    padding: 3px 10px; border-radius: 12px;
  }
  .facnav a b { color: var(--accent); font-weight: 600; }
  main { max-width: 1180px; margin: 0 auto; padding: 20px; }

  section.factie {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    margin-bottom: 26px; overflow: hidden;
    border-top: 3px solid var(--fc, var(--accent));
  }
  .fhead {
    display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .fhead h2 { margin: 0; font-size: 17px; color: var(--fc, var(--accent)); }
  .fhead .dieren { color: var(--dim); font-size: 12.5px; flex: 1 1 auto; }
  .fhead .fprog { flex: 0 0 200px; }
  .fhead .chev { color: var(--dim); font-size: 12px; width: 16px; text-align: center; }
  .fbody { padding: 0 18px 18px; }
  .collapsed .fbody { display: none; }

  h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 18px 0 8px; }
  .facnote {
    background: var(--panel2); border-left: 3px solid var(--opt); padding: 7px 12px;
    font-size: 12.5px; color: var(--dim); border-radius: 0 4px 4px 0; margin: 10px 0;
  }

  /* clips */
  .clips { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 4px 18px; }
  .clip { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 2px 0; }
  .clip input { accent-color: var(--ok); width: 15px; height: 15px; flex: none; }
  .clip .zoekterm { color: var(--dim); font-size: 11.5px; }
  .clip.done label { color: var(--dim); text-decoration: line-through; }
  .cliptype { margin-bottom: 8px; }
  .cliptype > .ctitel { font-size: 12.5px; color: var(--text); margin: 8px 0 4px; font-weight: 600; }

  /* units-tabel */
  .tabelwrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 860px; }
  th, td { padding: 4px 6px; text-align: center; border-bottom: 1px solid var(--line); }
  th { font-size: 11px; color: var(--dim); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  th.unit, td.unit { text-align: left; white-space: nowrap; }
  td.unit { font-family: ui-monospace, Consolas, monospace; font-size: 12.5px; }
  td.unit .tag {
    display: inline-block; font-size: 10px; font-family: system-ui, sans-serif;
    color: var(--opt); border: 1px solid var(--opt); border-radius: 3px;
    padding: 0 4px; margin-left: 6px; vertical-align: 1px;
  }
  tr.optioneel td.unit { color: var(--dim); }
  tr.done td.unit { color: var(--ok); }
  td input[type=checkbox] { accent-color: var(--ok); width: 16px; height: 16px; cursor: pointer; }
  td input[type=checkbox].opt { accent-color: var(--opt); }
  td.na { color: #3a4052; font-size: 12px; }
  td.notes { width: 170px; }
  td.notes input {
    width: 100%; background: transparent; border: none; border-bottom: 1px dashed var(--line);
    color: var(--text); font: inherit; font-size: 12px; padding: 2px 2px;
  }
  td.notes input:focus { outline: none; border-bottom-color: var(--accent); }
  td .pknop {
    font-size: 10.5px; padding: 2px 7px; border-radius: 3px;
  }
  tr:hover td { background: rgba(255,255,255,.02); }
  tr.promptrij td {
    background: #171a22; text-align: left; padding: 0;
    border-bottom: 1px solid var(--line);
  }
  tr.promptrij[hidden] { display: none; }
  .promptbox { padding: 10px 14px 12px; }
  .promptbox .pkop {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px;
  }
  .prompttekst {
    font-size: 12.5px; line-height: 1.65; color: #b9c0d4;
    background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--fc, var(--accent));
    border-radius: 0 4px 4px 0; padding: 9px 12px; max-width: 980px;
    white-space: pre-wrap; user-select: text; cursor: text;
  }
  .pknop.open { border-color: var(--accent); color: var(--accent); }
  .typekop td {
    background: var(--panel2); text-align: left; font-size: 12px; font-weight: 600;
    color: var(--text); padding: 5px 8px; letter-spacing: .5px;
  }
  .typekop .subprog { float: right; color: var(--dim); font-weight: 400; }

  .legenda { font-size: 11.5px; color: var(--dim); margin-top: 14px; }
  .legenda b { color: var(--text); font-weight: 600; }
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--accent); color: var(--text);
    padding: 8px 18px; border-radius: 5px; font-size: 13px; opacity: 0;
    pointer-events: none; transition: opacity .25s; z-index: 100;
  }
  #toast.zichtbaar { opacity: 1; }
  #savestamp { font-size: 11px; color: var(--dim); }
</style>
</head>
<body>

<header>
  <h1>Fog of War <span>Model Tracker</span></h1>
  <div class="topbar">
    <div class="totalwrap">
      <div class="bar"><i id="totalbar"></i></div>
      <div class="barlabel" id="totallabel"></div>
    </div>
    <div class="btns">
      <button id="btnExport">Backup (JSON)</button>
      <button id="btnImport">Herstel</button>
      <button id="btnReset">Reset</button>
    </div>
    <span id="savestamp"></span>
  </div>

</header>

<main id="main"></main>
<div id="toast"></div>

/* ============================================================
   STATE
   ============================================================ */
const OPSLAG_KEY = "fow-model-tracker-v1";
let state = null;

function laadState() {
  try {
    const raw = localStorage.getItem(OPSLAG_KEY);
    if (raw) { state = JSON.parse(raw); return; }
  } catch (e) { /* file:// zonder localStorage of corrupt: verse start */ }
  state = { checks: {}, notes: {}, dicht: {}, stamp: null };
  STARTSTAND.forEach(k => state.checks[k] = true);
}

function bewaarState() {
  state.stamp = new Date().toISOString();
  try { localStorage.setItem(OPSLAG_KEY, JSON.stringify(state)); } catch (e) {}
  toonStamp();
}

function toonStamp() {
  const el = document.getElementById("savestamp");
  el.textContent = state.stamp ? "Opgeslagen " + new Date(state.stamp).toLocaleString("nl-NL") : "";
}

/* ============================================================
   HELPERS
   ============================================================ */
const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");

function stapVanToepassing(stap, typeId) {
  return !(stap.na && stap.na.includes(typeId));
}

/* Telt (gedaan, totaal) van de VERPLICHTE stappen; mix-rijen en optionele
   stappen tellen niet mee in de voortgang. */
function telFactie(f) {
  let gedaan = 0, totaal = 0;
  for (const t of TYPES) {
    if (f.geenTypes && f.geenTypes.includes(t.id)) continue;
    for (const a of ARCHETYPES) {
      if (a === "mix") continue;
      for (const s of STAPPEN) {
        if (s.optioneel || !stapVanToepassing(s, t.id)) continue;
        totaal++;
        if (state.checks[f.id + "." + t.id + "_" + a + "." + s.id]) gedaan++;
      }
    }
  }
  return { gedaan, totaal };
}

/* ============================================================
   RENDER
   ============================================================ */
function bouw() {
  const main = document.getElementById("main");
  const nav = document.getElementById("facnav");
  main.innerHTML = "";
  nav.innerHTML = "";

  for (const f of FACTIES) {
    const a = document.createElement("a");
    a.href = "#f-" + f.id;
    a.id = "nav-" + f.id;
    nav.appendChild(a);

    const sec = document.createElement("section");
    sec.className = "factie" + (state.dicht[f.id] ? " collapsed" : "");
    sec.id = "f-" + f.id;
    sec.style.setProperty("--fc", f.kleur);

    let html = `
      <div class="fhead" data-fac="${f.id}">
        <span class="chev">${state.dicht[f.id] ? "&#9656;" : "&#9662;"}</span>
        <h2>${f.naam}</h2>
        <span class="dieren">${f.dieren}</span>
        <div class="fprog">
          <div class="bar small"><i id="bar-${f.id}"></i></div>
          <div class="barlabel" id="lbl-${f.id}"></div>
        </div>
      </div>
      <div class="fbody">`;

    if (f.noot) html += `<div class="facnote">${f.noot}</div>`;

    /* -- Animaties -- */
    html += `<h3>Animaties downloaden (Mixamo)</h3>`;
    for (const t of TYPES) {
      if (t.id === "artillery") continue;
      if (f.geenTypes && f.geenTypes.includes(t.id)) continue;
      const clips = t.id === "infantry" ? INF_CLIPS : CAV_CLIPS;
      html += `<div class="cliptype"><div class="ctitel">${t.naam}${t.id === "infantry" ? " (rifle-set; Muis = master, donor-merge kopieert)" : " (melee-set; eerste big bro wordt master)"}</div><div class="clips">`;
      for (const c of clips) {
        const key = `${f.id}.clips.${t.id}.${c.id}`;
        const aan = !!state.checks[key];
        html += `
          <div class="clip${aan ? " done" : ""}">
            <input type="checkbox" id="cb-${key.replace(/\./g, "-")}" data-key="${key}" ${aan ? "checked" : ""}>
            <label for="cb-${key.replace(/\./g, "-")}">${c.naam} <span class="zoekterm">| ${c.zoek}</span></label>
          </div>`;
      }
      html += `</div></div>`;
    }

    /* -- Units-tabel -- */
    html += `<h3>Modellen &amp; textures</h3><div class="tabelwrap"><table><thead><tr><th class="unit">Unit</th>`;
    for (const s of STAPPEN) html += `<th title="${esc(s.titel)}">${s.kop}</th>`;
    html += `<th>Prompt</th><th class="unit">Notitie</th></tr></thead><tbody>`;

    for (const t of TYPES) {
      if (f.geenTypes && f.geenTypes.includes(t.id)) continue;
      html += `<tr class="typekop"><td colspan="${STAPPEN.length + 3}">${t.naam}<span class="subprog" id="sub-${f.id}-${t.id}"></span></td></tr>`;
      for (const arch of ARCHETYPES) {
        const unit = t.id + "_" + arch;
        const optRij = arch === "mix";
        let alleKlaar = true;
        let cellen = "";
        for (const s of STAPPEN) {
          if (!stapVanToepassing(s, t.id)) { cellen += `<td class="na">-</td>`; continue; }
          const key = `${f.id}.${unit}.${s.id}`;
          const aan = !!state.checks[key];
          if (!aan && !s.optioneel && !optRij) alleKlaar = false;
          cellen += `<td><input type="checkbox" class="${s.optioneel || optRij ? "opt" : ""}" data-key="${key}" ${aan ? "checked" : ""} title="${esc(s.titel)}"></td>`;
        }
        const prompt = PROMPTS[f.id] && PROMPTS[f.id][unit];
        const noteKey = `${f.id}.${unit}`;
        const prId = `pr-${f.id}-${unit}`;
        html += `
          <tr class="${optRij ? "optioneel" : ""}${alleKlaar && !optRij ? " done" : ""}" data-rij="${f.id}.${unit}">
            <td class="unit">${unit}${optRij ? `<span class="tag">optioneel</span>` : ""}</td>
            ${cellen}
            <td>${prompt ? `<button class="pknop" data-toggle="${prId}">prompt &#9662;</button>` : `<span class="na">-</span>`}</td>
            <td class="notes"><input type="text" data-note="${noteKey}" value="${esc(state.notes[noteKey] || "")}" placeholder=""></td>
          </tr>`;
        if (prompt) html += `
          <tr class="promptrij" id="${prId}" hidden>
            <td colspan="${STAPPEN.length + 3}">
              <div class="promptbox">
                <div class="pkop">
                  <span>Generatie-prompt ${f.naam} / ${unit}</span>
                  <button class="pknop" data-prompt="${f.id}|${unit}">kopieer</button>
                </div>
                <div class="prompttekst">${esc(prompt)}</div>
              </div>
            </td>
          </tr>`;
      }
    }
    html += `</tbody></table></div>`;
    html += `<div class="legenda"><b>Blauwe vinkjes</b> = optioneel (telt niet mee in de voortgang). Volgorde per model: genereren, Mixamo-rig, delen splitsen (armL armR body hat legL legR tail), clips + fix-pass, 2 exports (glb + _gibs.glb), team-textures, 1024-import, Godot + tuner. Zie MODEL-WISHLIST.md par. 4.</div>`;
    html += `</div>`;
    sec.innerHTML = html;
    main.appendChild(sec);
  }

  koppelEvents();
  verversTellers();
  toonStamp();
}

function verversTellers() {
  let totGedaan = 0, totTotaal = 0;
  for (const f of FACTIES) {
    const { gedaan, totaal } = telFactie(f);
    totGedaan += gedaan; totTotaal += totaal;
    const pct = totaal ? Math.round(gedaan / totaal * 100) : 0;
    document.getElementById("bar-" + f.id).style.width = pct + "%";
    document.getElementById("lbl-" + f.id).textContent = `${gedaan}/${totaal} (${pct}%) - nog ${totaal - gedaan}`;
    const navEl = document.getElementById("nav-" + f.id);
    navEl.innerHTML = `${f.naam} <b>${pct}%</b>`;

    for (const t of TYPES) {
      const el = document.getElementById(`sub-${f.id}-${t.id}`);
      if (!el) continue;
      let g = 0, tot = 0;
      for (const a of ARCHETYPES) {
        if (a === "mix") continue;
        for (const s of STAPPEN) {
          if (s.optioneel || !stapVanToepassing(s, t.id)) continue;
          tot++;
          if (state.checks[`${f.id}.${t.id}_${a}.${s.id}`]) g++;
        }
      }
      el.textContent = `${g}/${tot}`;
    }
  }
  const pctTot = totTotaal ? Math.round(totGedaan / totTotaal * 100) : 0;
  document.getElementById("totalbar").style.width = pctTot + "%";
  document.getElementById("totallabel").textContent =
    `Totaal: ${totGedaan}/${totTotaal} verplichte stappen (${pctTot}%) - nog ${totTotaal - totGedaan} te doen`;
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("zichtbaar");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("zichtbaar"), 1600);
}

/* ============================================================
   EVENTS
   ============================================================ */
function koppelEvents() {
  document.getElementById("main").addEventListener("change", ev => {
    const el = ev.target;
    if (el.matches("input[type=checkbox][data-key]")) {
      const key = el.dataset.key;
      if (el.checked) state.checks[key] = true; else delete state.checks[key];
      bewaarState();
      /* rij- en clipstyling live bijwerken zonder volledige re-render */
      const rij = el.closest("tr");
      if (rij) {
        let klaar = true;
        rij.querySelectorAll("input[type=checkbox]:not(.opt)").forEach(cb => { if (!cb.checked) klaar = false; });
        rij.classList.toggle("done", klaar && !rij.classList.contains("optioneel"));
      }
      const clip = el.closest(".clip");
      if (clip) clip.classList.toggle("done", el.checked);
      verversTellers();
    }
  });

  document.getElementById("main").addEventListener("input", ev => {
    const el = ev.target;
    if (el.matches("input[data-note]")) {
      const key = el.dataset.note;
      if (el.value.trim()) state.notes[key] = el.value; else delete state.notes[key];
      clearTimeout(koppelEvents._nt);
      koppelEvents._nt = setTimeout(bewaarState, 400);
    }
  });

  document.getElementById("main").addEventListener("click", ev => {
    const kop = ev.target.closest(".fhead");
    if (kop && !ev.target.closest("input,button")) {
      const id = kop.dataset.fac;
      state.dicht[id] = !state.dicht[id];
      bewaarState();
      const sec = document.getElementById("f-" + id);
      sec.classList.toggle("collapsed", state.dicht[id]);
      kop.querySelector(".chev").innerHTML = state.dicht[id] ? "&#9656;" : "&#9662;";
      return;
    }
    const tg = ev.target.closest("button[data-toggle]");
    if (tg) {
      const rij = document.getElementById(tg.dataset.toggle);
      const open = rij.hidden;
      rij.hidden = !open;
      tg.classList.toggle("open", open);
      tg.innerHTML = open ? "prompt &#9652;" : "prompt &#9662;";
      return;
    }
    const pk = ev.target.closest("button[data-prompt]");
    if (pk) {
      const [fac, unit] = pk.dataset.prompt.split("|");
      const tekst = PROMPTS[fac][unit];
      const klaarMelding = () => toast("Prompt gekopieerd: " + fac + "/" + unit);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(tekst).then(klaarMelding, () => fallbackKopie(tekst, klaarMelding));
      } else {
        fallbackKopie(tekst, klaarMelding);
      }
    }
  });

  document.getElementById("btnExport").onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "model-tracker-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Backup gedownload");
  };
  document.getElementById("btnImport").onclick = () => document.getElementById("importfile").click();
  document.getElementById("importfile").onchange = ev => {
    const file = ev.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (!data.checks) throw new Error("geen checks");
        state = { checks: data.checks || {}, notes: data.notes || {}, dicht: data.dicht || {}, stamp: data.stamp || null };
        bewaarState();
        bouw();
        toast("Backup hersteld");
      } catch (e) { toast("Ongeldig backup-bestand"); }
    };
    r.readAsText(file);
    ev.target.value = "";
  };
  document.getElementById("btnReset").onclick = () => {
    if (!confirm("Alles wissen en terug naar de startstand (Muis-infanterie afgevinkt)?")) return;
    state = { checks: {}, notes: {}, dicht: {}, stamp: null };
    STARTSTAND.forEach(k => state.checks[k] = true);
    bewaarState();
    bouw();
    toast("Teruggezet naar startstand");
  };
}

/* Klembord-fallback voor file:// zonder clipboard-API */
function fallbackKopie(tekst, cb) {
  const ta = document.createElement("textarea");
  ta.value = tekst;
  ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); cb(); } catch (e) { toast("Kopieren mislukt"); }
  document.body.removeChild(ta);
}

laadState();
bouw();
</script>
